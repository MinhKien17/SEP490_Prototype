services:
  db:
    image: mysql:8.0.34
    container_name: evidence_pilot_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT_HOST:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - evidence-network

  vector_db:
    image: qdrant/qdrant:latest
    container_name: evidence_pilot_qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT_HOST:-6333}:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - evidence-network

  minio:
    image: minio/minio:latest
    container_name: evidence_pilot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: MinioAdminSecurePass123!
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - evidence-network

  minio-init:
    image: minio/mc:latest
    container_name: evidence_pilot_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin MinioAdminSecurePass123!) do echo 'Waiting for MinIO...'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing myminio/evidence-pilot-bucket;
      /usr/bin/mc anonymous set public myminio/evidence-pilot-bucket;
      echo 'Bucket created and configured';
      "
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: MinioAdminSecurePass123!
    networks:
      - evidence-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: evidence_pilot_rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmqadmin
      RABBITMQ_DEFAULT_PASS: RabbitMqAdminPass123!
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - evidence-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evidence_pilot_be
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT_HOST:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      vector_db:
        condition: service_started
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # ── Database (internal Docker network — use service name, NOT host port) ──
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      # ── Qdrant (internal Docker network) ─────────────────────────────────────
      QDRANT_URL: http://vector_db:6333

      # ── MinIO (hardcoded, no .env vars provided) ─────────────────────────────
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: MinioAdminSecurePass123!
      MINIO_BUCKET_NAME: evidence-pilot-bucket

      # ── RabbitMQ (hardcoded, no .env vars provided) ──────────────────────────
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: rabbitmqadmin
      RABBITMQ_PASSWORD: RabbitMqAdminPass123!

      # ── AI Model (from .env) ─────────────────────────────────────────────────
      AI_MODEL_BASE_URL: ${AI_MODEL_BASE_URL}
      AI_MODEL_API_KEY: ""
      AI_MODEL_READ_TIMEOUT_SECONDS: "600"

      # ── Admin seed (from .env) ──────────────────────────────────────────────
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      EMAIL_VERIFICATION_URL: ${EMAIL_VERIFICATION_URL:-}
      EMAIL_VERIFICATION_TOKEN_TTL_HOURS: ${EMAIL_VERIFICATION_TOKEN_TTL_HOURS:-24}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}

      SERVER_PORT: 8080
    networks:
      - evidence-network

networks:
  evidence-network:
    driver: bridge

volumes:
  db_data:
  qdrant_data:
  minio_data:
  rabbitmq_data:
